[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    integration: integration tests
    external: tests requiring external services such as real Redis/Postgres
    stress: high-volume load tests (exclude in routine CI with -m "not stress")
    chaos: failure-injection tests (exclude in routine CI with -m "not chaos")
addopts = -m "not stress and not chaos"

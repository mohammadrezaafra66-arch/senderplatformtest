name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-messaging-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: multi-messaging-platform/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test SESSION_SECRET
        run: |
          python -c "from cryptography.fernet import Fernet; print('SESSION_SECRET=' + Fernet.generate_key().decode())" >> $GITHUB_ENV

      - name: Run unit and integration tests
        env:
          SECRET_KEY: test-secret-key
          DATABASE_URL: postgresql://mmp_user:mmp_pass@localhost:5432/mmp_db
          REDIS_URL: redis://localhost:6379/0
        run: pytest -m "not stress and not chaos"
